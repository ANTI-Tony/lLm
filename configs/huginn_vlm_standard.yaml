# Standard Phase 0 preset: ~12-15h on A100.
# Use this if Fast Phase 0 shows peak but you want a publication-grade number.
#
#   python -m src.train.train_projector --config configs/huginn_vlm_standard.yaml

model:
  llm_name: "tomg-group-umd/huginn-0125"
  vision_encoder: "openai/clip-vit-large-patch14-336"
  projector_type: "mlp2x_gelu"
  llm_hidden_size: 5280
  vision_hidden_size: 1024
  freeze_llm: true
  freeze_vision: true
  image_token: "<image>"
  image_token_id: null

train:
  output_dir: "./checkpoints/projector_huginn_standard"
  data_path: "data/llava/llava_pretrain_558k.json"
  image_folder: "data/llava/images"
  max_samples: 100000
  num_train_epochs: 1
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-3
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_seq_length: 512
  num_steps_for_training: 8
  logging_steps: 20
  save_steps: 2000
  bf16: true
  seed: 42
  dataloader_num_workers: 4

eval:
  num_steps_sweep: [4, 8, 16, 32, 64]
  benchmarks:
    mmmu:
      dataset: "lmms-lab/MMMU"
      split: "validation"
      max_samples: 900
    mathvista:
      dataset: "lmms-lab/MathVista"
      split: "testmini"
      max_samples: 1000
    scienceqa:
      dataset: "derek-thomas/ScienceQA"
      split: "validation"
      max_samples: 2000
  max_new_tokens: 64
  output_dir: "./results"
