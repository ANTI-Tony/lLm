# Phase 0 configuration: Huginn LLM + CLIP ViT-L/14 + MLP projector
# Goal: verify whether looped depth helps VLM reasoning on MMMU/MathVista/ScienceQA.

model:
  llm_name: "tomg-group-umd/huginn-0125"
  vision_encoder: "openai/clip-vit-large-patch14-336"
  projector_type: "mlp2x_gelu"
  llm_hidden_size: 5280        # Huginn hidden size (auto-detect at runtime; update if wrong)
  vision_hidden_size: 1024     # CLIP ViT-L/14 hidden size
  freeze_llm: true
  freeze_vision: true
  image_token: "<image>"
  image_token_id: null         # filled at runtime (we use a reserved id)

train:
  output_dir: "./checkpoints/projector_huginn"
  data_path: "data/llava/llava_pretrain_558k.json"
  image_folder: "data/llava/images"

  # Fast Phase 0 preset (~1.5h on A100-80G).
  # After fixing the grad bug we learned that num_steps=(0, N) means all N
  # recurrent iterations carry gradient, so each training step is N× more
  # expensive than Huginn's default inference mode. Trimming num_steps
  # to 4 and max_samples to 8k puts us at ~500 optimizer steps × ~10s ≈
  # 1.5h, enough to get a functional projector for H1 evaluation.
  #
  # If results are noisy and you want a higher-quality projector, see
  # configs/huginn_vlm_standard.yaml.
  max_samples: 8000
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4      # eff batch 16, more optimizer steps per epoch
  learning_rate: 1.0e-3
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_seq_length: 1024                # 576 image + ~200 text fits comfortably
  num_steps_for_training: 4           # halves per-step backprop cost vs ns=8
  logging_steps: 10
  save_steps: 250                     # checkpoint midway in case of crash
  bf16: true
  seed: 42
  dataloader_num_workers: 4

eval:
  # Fast sweep: 3 points is enough to tell peak-vs-flat. Add 8, 32 later if needed.
  num_steps_sweep: [4, 16, 64]
  benchmarks:
    mmmu:
      dataset: "lmms-lab/MMMU"
      split: "validation"
      max_samples: 300
    mathvista:
      dataset: "lmms-lab/MathVista"
      split: "testmini"
      max_samples: 300
    scienceqa:
      dataset: "derek-thomas/ScienceQA"
      split: "validation"
      max_samples: 500
  max_new_tokens: 64
  output_dir: "./results"
