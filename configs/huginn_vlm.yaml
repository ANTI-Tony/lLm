# Phase 0 configuration: Huginn LLM + CLIP ViT-L/14 + MLP projector
# Goal: verify whether looped depth helps VLM reasoning on MMMU/MathVista/ScienceQA.

model:
  llm_name: "tomg-group-umd/huginn-0125"
  vision_encoder: "openai/clip-vit-large-patch14-336"
  projector_type: "mlp2x_gelu"
  llm_hidden_size: 5280        # Huginn hidden size (auto-detect at runtime; update if wrong)
  vision_hidden_size: 1024     # CLIP ViT-L/14 hidden size
  freeze_llm: true
  freeze_vision: true
  image_token: "<image>"
  image_token_id: null         # filled at runtime (we use a reserved id)

train:
  output_dir: "./checkpoints/projector_huginn"
  data_path: "data/llava/llava_pretrain_558k.json"
  image_folder: "data/llava/images"

  # Fast Phase 0 preset, v2.
  # v1 (LR 1e-3, 8k samples) collapsed to a degenerate EOS-only solution:
  # training loss hit 0.005 but inference produced empty strings (0% on
  # MMMU vs 25% random baseline). LR too high + too few samples let the
  # projector find a trivial shortcut instead of learning the vision->text
  # mapping.
  #
  # v2 changes: LR 1e-3 -> 2e-4 (5x lower), samples 8k -> 15k (more data
  # to dilute shortcuts), warmup 0.03 -> 0.06 (smoother start). Expected
  # final loss 2-4 (real next-token CE); if it drops below 1 again,
  # something is still collapsing.
  max_samples: 15000
  num_train_epochs: 1
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  warmup_ratio: 0.06
  weight_decay: 0.0
  max_seq_length: 1024
  num_steps_for_training: 4
  logging_steps: 10
  save_steps: 500
  bf16: true
  seed: 42
  dataloader_num_workers: 4

eval:
  # Fast sweep: 3 points is enough to tell peak-vs-flat. Add 8, 32 later if needed.
  num_steps_sweep: [4, 16, 64]
  benchmarks:
    mmmu:
      dataset: "lmms-lab/MMMU"
      split: "validation"
      max_samples: 300
    mathvista:
      dataset: "lmms-lab/MathVista"
      split: "testmini"
      max_samples: 300
    scienceqa:
      dataset: "derek-thomas/ScienceQA"
      split: "validation"
      max_samples: 500
  # MCQ answers are 1-5 tokens at most ("A", "The answer is B", etc.).
  # 64 wastes the ~3x slowdown per-sample at num_steps=64 with no upside.
  max_new_tokens: 16
  output_dir: "./results"
